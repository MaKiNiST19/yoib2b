<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giriş — Yoi Studio Talep Sistemi</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="login-page">

  <div class="login-card">
    <div class="login-header">
      <div class="logo-mark" style="width:56px;height:56px;background:#C9A84C;border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-weight:800;font-size:22px;color:#1A1A2E;">Y</div>
      <h1>Yoi Studio Dekorasyon</h1>
      <p>Slide Design — Türkiye Resmi Distribütörü</p>
    </div>
    <div class="login-body">
      <h2>Hoş Geldiniz</h2>
      <p>Bayi hesabınıza giriş yaparak ürün talebi oluşturabilirsiniz.</p>

      <div id="login-error" class="alert alert-error" style="display:none;"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="username">Kullanıcı Adı</label>
          <input type="text" id="username" class="form-control" placeholder="kullanıcı adınız" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label for="password">Şifre</label>
          <div style="position:relative;">
            <input type="password" id="password" class="form-control" placeholder="••••••••" autocomplete="current-password" required style="padding-right:44px;">
            <button type="button" id="eye-btn" onclick="togglePassword()" style="position:absolute;right:0;top:0;height:100%;width:42px;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#9CA3AF;padding:0;" tabindex="-1">
              <svg id="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg id="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-lg" id="login-btn">
          Giriş Yap
        </button>
      </form>

      <p style="text-align:center;margin-top:24px;font-size:12px;color:#9CA3AF;">
        Hesap bilgilerinizi unuttuysanız yöneticinizle iletişime geçin.
      </p>
    </div>
  </div>

  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      const open = document.getElementById('eye-open');
      const closed = document.getElementById('eye-closed');
      const btn = document.getElementById('eye-btn');
      if (input.type === 'password') {
        input.type = 'text';
        open.style.display = 'none';
        closed.style.display = 'block';
        btn.style.color = '#C9A84C';
      } else {
        input.type = 'password';
        open.style.display = 'block';
        closed.style.display = 'none';
        btn.style.color = '#9CA3AF';
      }
    }

    // Already logged in?
    const token = localStorage.getItem('ys_token');
    const user = JSON.parse(localStorage.getItem('ys_user') || 'null');
    if (token && user) {
      window.location.href = user.role === 'admin' ? '/admin' : '/';
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const err = document.getElementById('login-error');
      err.style.display = 'none';
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Giriş yapılıyor...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value.trim(),
            password: document.getElementById('password').value,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Giriş başarısız');
        localStorage.setItem('ys_token', data.token);
        localStorage.setItem('ys_user', JSON.stringify(data.user));
        window.location.href = data.user.role === 'admin' ? '/admin' : '/';
      } catch (ex) {
        err.textContent = ex.message;
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Giriş Yap';
      }
    });
  </script>
</body>
</html>
